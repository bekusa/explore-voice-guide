<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Lokali</title>
    <style>
      /*
        Capacitor server.errorPath fallback. The wrapped WebView lands
        here when https://lokali.travel fails to load.

        Self-contained styling — no external assets, no Tailwind,
        no React. Reads saved tours from Capacitor Preferences and
        cached mp3s from Filesystem, presents them in a polished
        mini-player UI that matches the main app's gold-on-charcoal
        aesthetic.
      */
      :root {
        color-scheme: dark;
        --bg: #0f0f0f;
        --fg: #f4f1ea;
        --muted: rgba(244, 241, 234, 0.55);
        --gold: #f4b400;
        --gold-deep: #c98a00;
        --card: rgba(244, 241, 234, 0.04);
        --card-border: rgba(244, 241, 234, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: 28px 20px;
        padding-top: max(40px, env(safe-area-inset-top, 40px));
        padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
        gap: 18px;
        min-height: 100%;
      }
      header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
        padding: 0 4px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 13px;
        border-radius: 999px;
        border: 1px solid rgba(244, 180, 0, 0.35);
        background: rgba(244, 180, 0, 0.08);
        color: var(--gold);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 10px var(--gold);
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 500;
        font-size: 26px;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .lede {
        margin: 0;
        max-width: 32ch;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      h2 {
        margin: 4px 0 0;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }
      ul.saved {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      ul.saved > li {
        border: 1px solid var(--card-border);
        background: var(--card);
        border-radius: 18px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .hero {
        width: 100%;
        aspect-ratio: 16/9;
        background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
        background-size: cover;
        background-position: center;
        position: relative;
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(15,15,15,0.6) 0%, rgba(15,15,15,0) 60%);
      }
      .card-body {
        padding: 14px 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .row-top {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }
      .title {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 17px;
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }
      .meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        letter-spacing: 0.04em;
      }
      .description {
        font-size: 12.5px;
        line-height: 1.5;
        color: rgba(244, 241, 234, 0.78);
        margin: 0;
      }
      .guide-toggle {
        appearance: none;
        border: 1px solid var(--card-border);
        background: transparent;
        color: var(--gold);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.03em;
        padding: 9px 13px;
        border-radius: 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        align-self: flex-start;
        transition: background 120ms ease;
      }
      .guide-toggle:active {
        background: rgba(244, 241, 234, 0.05);
      }
      .guide-full {
        display: none;
        font-size: 13px;
        line-height: 1.62;
        color: rgba(244, 241, 234, 0.82);
      }
      .guide-full.open {
        display: block;
      }
      .guide-full p {
        margin: 0 0 10px;
      }
      .guide-full p:last-child {
        margin-bottom: 0;
      }
      .text-col {
        min-width: 0;
        flex: 1;
      }
      .play-btn {
        appearance: none;
        border: 0;
        width: 44px;
        height: 44px;
        flex: 0 0 44px;
        border-radius: 999px;
        color: #0f0f0f;
        background: linear-gradient(135deg, #f4b400 0%, #c98a00 100%);
        box-shadow: 0 6px 20px rgba(244, 180, 0, 0.22);
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: transform 120ms ease;
      }
      .play-btn:active {
        transform: scale(0.94);
      }
      .play-btn[disabled] {
        opacity: 0.55;
        cursor: wait;
      }
      .play-btn svg {
        width: 16px;
        height: 16px;
        fill: #0f0f0f;
      }
      .progress-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 10.5px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .progress-bar {
        flex: 1;
        height: 4px;
        border-radius: 999px;
        background: rgba(244, 241, 234, 0.1);
        overflow: hidden;
        position: relative;
      }
      .progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0%;
        background: linear-gradient(90deg, #f4b400, #c98a00);
        transition: width 150ms linear;
      }
      .row-error {
        font-size: 11.5px;
        color: #ff9090;
        background: rgba(255, 80, 80, 0.08);
        border: 1px solid rgba(255, 80, 80, 0.25);
        border-radius: 10px;
        padding: 8px 12px;
      }
      .empty {
        margin: 8px 0 0;
        padding: 22px 16px;
        text-align: center;
        color: var(--muted);
        font-size: 13.5px;
        line-height: 1.55;
        border: 1px dashed rgba(244, 241, 234, 0.13);
        border-radius: 16px;
        background: rgba(244, 241, 234, 0.02);
      }
      .footer {
        margin-top: auto;
        padding-top: 18px;
        text-align: center;
      }
      .reconnect {
        appearance: none;
        background: transparent;
        border: 0;
        padding: 8px 16px;
        color: var(--muted);
        font-size: 11.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        cursor: pointer;
        border-radius: 999px;
        transition: color 120ms ease, background 120ms ease;
      }
      .reconnect:hover {
        color: var(--fg);
        background: rgba(244, 241, 234, 0.04);
      }
      .icon-wifi {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="badge"><span class="dot"></span>Offline</span>
      <svg
        class="icon-wifi"
        width="38"
        height="38"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#f4b400"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="2" y1="2" x2="22" y2="22"></line>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"></path>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"></path>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"></path>
        <path d="M5 13a10 10 0 0 1 5.17-2.69"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
      <h1>You're offline</h1>
      <p class="lede">
        Your saved tours are below — tap Play to listen from the local cache.
      </p>
    </header>

    <h2 id="savedHeading">Saved tours</h2>
    <ul id="savedList" class="saved"></ul>

    <div class="footer">
      <button class="reconnect" type="button" id="retryBtn">↻ Try reconnecting</button>
    </div>

        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m + ":" + (s < 10 ? "0" + s : s);
      }

      function setMessage(message, kind) {
        list.innerHTML = "";
        const li = document.createElement("li");
        li.className = kind === "error" ? "empty" : "empty";
        if (kind === "error") {
          li.style.borderColor = "rgba(255, 80, 80, 0.25)";
          li.style.color = "rgba(255, 120, 120, 0.85)";
        }
        li.textContent = message;
        list.appendChild(li);
      }

      function playIconSvg() {
        return (
          '<svg viewBox="0 0 24 24" aria-hidden="true">' +
          '<path d="M8 5v14l11-7L8 5z"/>' +
          "</svg>"
        );
      }
      function pauseIconSvg() {
        return (
          '<svg viewBox="0 0 24 24" aria-hidden="true">' +
          '<rect x="6" y="5" width="4" height="14" rx="1"/>' +
          '<rect x="14" y="5" width="4" height="14" rx="1"/>' +
          "</svg>"
        );
      }

      function renderItems(items) {
        list.innerHTML = "";
        if (!items.length) {
          setMessage(
            "Nothing saved yet. Open a tour while online and tap Save.",
          );
          return;
        }
        for (const item of items) {
          const li = document.createElement("li");

          // Hero photo — inlined data URL stored alongside the
          // saved tour. Falls through cleanly when missing.
          if (item.imageDataUrl) {
            const hero = document.createElement("div");
            hero.className = "hero";
            hero.style.backgroundImage = "url('" + item.imageDataUrl + "')";
            li.appendChild(hero);
          }

          const body = document.createElement("div");
          body.className = "card-body";

          const topRow = document.createElement("div");
          topRow.className = "row-top";

          const playBtn = document.createElement("button");
          playBtn.className = "play-btn";
          playBtn.type = "button";
          playBtn.setAttribute("aria-label", "Play");
          playBtn.innerHTML = playIconSvg();
          topRow.appendChild(playBtn);

          const textCol = document.createElement("div");
          textCol.className = "text-col";
          const title = document.createElement("div");
          title.className = "title";
          title.textContent = item.name;
          textCol.appendChild(title);
          if (item.city) {
            const meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = item.city;
            textCol.appendChild(meta);
          }
          topRow.appendChild(textCol);

          body.appendChild(topRow);

          // Description (outside_desc / insider_desc / description),
          // already in the user's saved language.
          if (item.description) {
            const desc = document.createElement("p");
            desc.className = "description";
            desc.textContent = item.description;
            body.appendChild(desc);
          }

          // Full narrated guide text. The complete script is already on
          // disk — offlineStore.fetchAndCacheTour writes it to
          // lokali/scripts/<id>-<lang>.txt at download time, right
          // alongside the mp3. We render it lazily inside an expandable
          // section so the offline card carries the WHOLE tour (hero
          // image + full text + audio), not just the audio player.
          const guideToggle = document.createElement("button");
          guideToggle.className = "guide-toggle";
          guideToggle.type = "button";
          guideToggle.textContent = "Read full guide";
          const guideFull = document.createElement("div");
          guideFull.className = "guide-full";
          let guideLoaded = false;
          guideToggle.addEventListener("click", async () => {
            if (!guideLoaded) {
              guideToggle.disabled = true;
              const text = await loadOfflineScript(item);
              guideFull.innerHTML = "";
              if (!text) {
                const none = document.createElement("p");
                none.style.color = "var(--muted)";
                none.textContent =
                  "Full text isn't downloaded for this tour. Open it once online to cache it.";
                guideFull.appendChild(none);
              } else {
                // Split on blank lines into paragraphs; textContent keeps
                // it safe from any stray markup in the cached script.
                const paras = text.split(/\n{2,}/);
                for (let p = 0; p < paras.length; p++) {
                  const t = paras[p].trim();
                  if (!t) continue;
                  const el = document.createElement("p");
                  el.textContent = t;
                  guideFull.appendChild(el);
                }
              }
              guideLoaded = true;
              guideToggle.disabled = false;
            }
            const open = guideFull.classList.toggle("open");
            guideToggle.textContent = open ? "Hide full guide" : "Read full guide";
          });
          body.appendChild(guideToggle);
          body.appendChild(guideFull);

          // Hidden <audio> element + custom progress row. All audio
          // chrome lives inside the card body so spacing matches the
          // text rows above. Audio element itself stays display:none.
          const audio = document.createElement("audio");
          audio.preload = "none";
          audio.style.display = "none";
          body.appendChild(audio);

          const progressRow = document.createElement("div");
          progressRow.className = "progress-row";
          progressRow.style.display = "none";

          const elapsed = document.createElement("span");
          elapsed.textContent = "0:00";
          progressRow.appendChild(elapsed);

          const progressBar = document.createElement("div");
          progressBar.className = "progress-bar";
          const progressFill = document.createElement("div");
          progressFill.className = "progress-fill";
          progressBar.appendChild(progressFill);
          progressRow.appendChild(progressBar);

          const total = document.createElement("span");
          total.textContent = "0:00";
          progressRow.appendChild(total);

          body.appendChild(progressRow);

          const errorRow = document.createElement("div");
          errorRow.className = "row-error";
          errorRow.style.display = "none";
          errorRow.textContent = "Audio not cached on this device.";
          body.appendChild(errorRow);

          li.appendChild(body);

          let loaded = false;

          audio.addEventListener("loadedmetadata", () => {
            total.textContent = fmt(audio.duration);
            progressRow.style.display = "flex";
          });
          audio.addEventListener("timeupdate", () => {
            const pct =
              audio.duration > 0 ? (audio.currentTime / audio.duration) * 100 : 0;
            progressFill.style.width = pct + "%";
            elapsed.textContent = fmt(audio.currentTime);
          });
          audio.addEventListener("ended", () => {
            playBtn.innerHTML = playIconSvg();
            playBtn.setAttribute("aria-label", "Play");
          });
          audio.addEventListener("error", () => {
            errorRow.style.display = "block";
            playBtn.disabled = true;
          });

          playBtn.addEventListener("click", async () => {
            if (!loaded) {
              playBtn.disabled = true;
              try {
                const objectUrl = await loadOfflineAudio(item);
                if (!objectUrl) {
                  errorRow.style.display = "block";
                  playBtn.style.display = "none";
                  return;
                }
                audio.src = objectUrl;
                loaded = true;
                playBtn.disabled = false;
                playBtn.innerHTML = pauseIconSvg();
                playBtn.setAttribute("aria-label", "Pause");
                await audio.play();
              } catch (err) {
                console.warn("offline.html: load audio failed", err);
                errorRow.style.display = "block";
                playBtn.style.display = "none";
              }
              return;
            }
            if (audio.paused) {
              playBtn.innerHTML = pauseIconSvg();
              playBtn.setAttribute("aria-label", "Pause");
              await audio.play().catch(() => {});
            } else {
              audio.pause();
              playBtn.innerHTML = playIconSvg();
              playBtn.setAttribute("aria-label", "Play");
            }
          });

          list.appendChild(li);
        }
      }

      function safeId(raw) {
        return String(raw)
          .toLowerCase()
          .replace(/[^a-z0-9-]/g, "-")
          .slice(0, 200);
      }

      async function loadOfflineAudio(item) {
        // Mirror of `offlineStore.audioId` — keep these in sync.
        const audioFileId = safeId(
          item.id + "-" + item.language + "-" + item.voice,
        );
        const path = "lokali/audio/" + audioFileId + ".mp3";
        if (!window.Capacitor) return null;
        const Filesystem =
          (window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) ||
          (typeof window.Capacitor.registerPlugin === "function"
            ? window.Capacitor.registerPlugin("Filesystem")
            : null);
        if (!Filesystem) return null;
        let base64;
        try {
          const result = await Filesystem.readFile({
            path: path,
            directory: "DATA",
          });
          base64 = result.data;
        } catch (err) {
          return null;
        }
        if (typeof base64 !== "string") return null;
        const comma = base64.indexOf(",");
        const raw = comma >= 0 ? base64.slice(comma + 1) : base64;
        const binary = atob(raw);
        const len = binary.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: "audio/mpeg" });
        const url = URL.createObjectURL(blob);
        liveBlobUrls.push(url);
        return url;
      }

      async function loadOfflineScript(item) {
        // Mirror of offlineStore.scriptId(slug, language):
        // safeId(`${slug}-${language}`). The script was written as UTF-8
        // text (not base64) via Filesystem with Encoding.UTF8, so we
        // read it back with encoding:"utf8" and get a plain string.
        const sid = safeId(item.id + "-" + item.language);
        const path = "lokali/scripts/" + sid + ".txt";
        if (!window.Capacitor) return null;
        const Filesystem =
          (window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) ||
          (typeof window.Capacitor.registerPlugin === "function"
            ? window.Capacitor.registerPlugin("Filesystem")
            : null);
        if (!Filesystem) return null;
        try {
          const result = await Filesystem.readFile({
            path: path,
            directory: "DATA",
            encoding: "utf8",
          });
          return typeof result.data === "string" ? result.data : null;
        } catch (err) {
          return null;
        }
      }

      // Read the saved-tours JSON from Capacitor Preferences. Returns
      // { ready, raw }: ready=false means the bridge / Preferences
      // plugin hasn't attached yet (caller should retry), raw is the
      // stored string (or null when the key is genuinely empty).
      async function readSavedRaw() {
        if (
          !window.Capacitor ||
          !(
            window.Capacitor.Plugins ||
            typeof window.Capacitor.registerPlugin === "function"
          )
        ) {
          return { ready: false, raw: null };
        }
        const Preferences =
          (window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences) ||
          (typeof window.Capacitor.registerPlugin === "function"
            ? window.Capacitor.registerPlugin("Preferences")
            : null);
        if (!Preferences) return { ready: false, raw: null };
        try {
          const result = await Preferences.get({ key: "lokali.saved.v1" });
          return {
            ready: true,
            raw: result && typeof result.value === "string" ? result.value : null,
          };
        } catch (err) {
          // Plugin present but not answering yet — treat as not-ready
          // so the retry loop gives it another chance.
          return { ready: false, raw: null };
        }
      }

      let renderedOnce = false;

      async function loadSavedList() {
        if (!renderedOnce) setMessage("Loading your saved tours…");
        // Retry loop. On a cold OFFLINE launch the native bridge and the
        // Preferences plugin attach to this errorPath page a moment
        // after load — a single-shot read lost that race, which is why
        // the list only appeared AFTER a manual "Try reconnecting" tap.
        // We now poll for up to ~9 s and render the instant the bridge
        // answers, so saved tours show up on the FIRST offline open with
        // zero taps. Only after the deadline do we surface a message.
        const DEADLINE = Date.now() + 9000;
        let sawBridge = false;
        for (;;) {
          const state = await readSavedRaw();
          if (state.ready) {
            sawBridge = true;
            if (!state.raw) {
              if (!renderedOnce)
                setMessage("Nothing saved yet. Open a tour while online and tap Save.");
              return;
            }
            let parsed;
            try {
              parsed = JSON.parse(state.raw);
            } catch (e) {
              setMessage("The offline library looks corrupt.", "error");
              return;
            }
            if (!Array.isArray(parsed) || parsed.length === 0) {
              if (!renderedOnce)
                setMessage("Nothing saved yet. Open a tour while online and tap Save.");
              return;
            }
            renderItems(parsed);
            renderedOnce = true;
            return;
          }
          if (Date.now() > DEADLINE) break;
          await new Promise(function (r) {
            setTimeout(r, 350);
          });
        }
        // Don't clobber an already-rendered list with an error if a
        // later refresh (e.g. visibilitychange) races and times out.
        if (!renderedOnce) {
          setMessage(
            sawBridge
              ? "Couldn't read your offline library. Reopen the app once you're back online."
              : "Saved tours aren't ready yet. Reopen the app once you're back online.",
            "error",
          );
        }
      }

      // Defer the first call until next tick so the static page paints
      // first. Also re-run when the page regains visibility — on some
      // devices the bridge only fully attaches after the first resume,
      // and this makes the list fill in without any user action.
      window.addEventListener("load", function () {
        setTimeout(loadSavedList, 0);
      });
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden && !renderedOnce) {
          void loadSavedList();
        }
      });

      // Quiet "Try reconnecting" link at the bottom — same idea as
      // the old loud gold button, but visually demoted so it
      // doesn't dominate the offline page.
      document
        .getElementById("retryBtn")
        .addEventListener("click", function () {
          // Beka 2026-07-05 — ALWAYS go to the production origin.
          // The previous window.location.origin form broke in the
          // Capacitor errorPath context: there the page lives on
          // https://localhost, so origin + "/saved" navigated to
          // localhost/saved — a host that's NOT in allowNavigation,
          // which Capacitor kicks out to the external browser →
          // "This site can't be reached" dead end (Beka hit this
          // on-device). Hardcoding the production URL keeps the
          // navigation inside the WebView in every context; if the
          // device is still offline the WebView just lands back on
          // this offline page.
          window.location.href = "https://lokali.travel/saved";
        });
    </script>
  </body>
</html>
